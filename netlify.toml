# ── Netlify konfigurasjon for Stabæk Kampanalyse ──────────────────

[build]
  publish = "."

# Sikkerhetshoder — viktig for PDF-parsing via Anthropic API
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://fonts.googleapis.com https://fonts.gstatic.com https://generativelanguage.googleapis.com https://res.cdn.office.net; img-src 'self' data:; connect-src 'self' https://generativelanguage.googleapis.com;"

# Alle ruter peker til index.html (single-page app)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
